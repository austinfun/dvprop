<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>404 - Page Not Found</title>
        <link href='http://fonts.googleapis.com/css?family=Raleway:400,700' rel='stylesheet' type='text/css'>
        <link rel="stylesheet" href="css/font-awesome/css/font-awesome.min.css">
        <link href="css/bootstrap/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="css/style.css">
        <link rel="stylesheet" href="css/responsive.css">
        <style>
            .error-wrap { padding: 120px 0; text-align: center; }
            .error-wrap h1 { font-size: 120px; font-weight: 700; margin: 0; line-height: 1; }
            .error-wrap h2 { font-size: 32px; margin: 20px 0; }
            .error-wrap p { font-size: 18px; margin-bottom: 30px; }
            .error-wrap a.home-btn {
                display: inline-block; padding: 12px 30px; background: #333; color: #fff;
                text-decoration: none; border-radius: 4px; font-weight: 700;
            }
            .error-wrap a.home-btn:hover { background: #555; }
        </style>
    </head>
    <body>
        <section id="error">
            <div class="container">
                <div class="row">
                    <div class="col-sm-12">
                        <div class="error-wrap">
                            <h1>404</h1>
                            <h2>Page Not Found</h2>
                            <p>Sorry, the page you're looking for doesn't exist or has been moved.</p>
                            <a href="/" class="home-btn">Return Home</a>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <footer id="footer" class="center-content">
            <div class="container">
                <div class="row">
                    <div class="col-md-12 col-sm-12">
                        <div class="copyright_text">
                            <p>How A Real Estate Agent Can Help When Your Looking For Commercial Real Estate Rental In Austin | &copy; 2022. All Rights Reserved</p>
                        </div>
                    </div>
                </div>
            </div>
        </footer>
    </body>
</html>
